<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff003c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#39ff14;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="#000000" rx="6"/>
  
  <!-- TechForge Logo - Geometric Design -->
  <g transform="translate(16, 16)" filter="url(#glow)">
    <!-- Outer hexagon frame -->
    <path d="M -10,-6 L -6,-10 L 6,-10 L 10,-6 L 10,6 L 6,10 L -6,10 L -10,6 Z" 
          fill="none" 
          stroke="url(#techGradient)" 
          stroke-width="1.5" 
          opacity="0.8"/>
    
    <!-- Inner circuit pattern -->
    <g stroke="#00f3ff" stroke-width="0.8" fill="none" opacity="0.9">
      <line x1="-6" y1="0" x2="-2" y2="0"/>
      <line x1="2" y1="0" x2="6" y2="0"/>
      <line x1="0" y1="-6" x2="0" y2="-2"/>
      <line x1="0" y1="2" x2="0" y2="6"/>
      <circle cx="0" cy="0" r="1.5" fill="#ff003c"/>
    </g>
    
    <!-- Tech elements -->
    <g fill="url(#techGradient)" opacity="0.7">
      <rect x="-8" y="-1" width="2" height="2" rx="0.3"/>
      <rect x="6" y="-1" width="2" height="2" rx="0.3"/>
      <rect x="-1" y="-8" width="2" height="2" rx="0.3"/>
      <rect x="-1" y="6" width="2" height="2" rx="0.3"/>
    </g>
    
    <!-- Center emblem -->
    <text x="0" y="3" text-anchor="middle" 
          font-family="monospace" 
          font-size="8" 
          font-weight="bold" 
          fill="#39ff14">TF</text>
  </g>
</svg>
