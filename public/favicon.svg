<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="veloGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="#0f172a" rx="6"/>
  
  <!-- Velo Code Logo - Speed Arrow Design -->
  <g transform="translate(16, 16)" filter="url(#glow)">
    <!-- Outer circle frame -->
    <circle cx="0" cy="0" r="12" 
          fill="none" 
          stroke="url(#veloGradient)" 
          stroke-width="2" 
          opacity="0.9"/>
    
    <!-- Speed arrow pointing right -->
    <path d="M -8,-2 L 4,-2 L 0,-6 M4,-2 L 0,2" 
          stroke="url(#veloGradient)" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"/>
    
    <!-- Speed lines -->
    <path d="M 6,-4 L 10,-2 L 6,0" 
          stroke="#60a5fa" 
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"/>
    
    <!-- Center dot -->
    <circle cx="-2" cy="4" r="1.5" fill="#8b5cf6"/>
  </g>
</svg>
