<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="veloGradientLarge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glowLarge">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="192" height="192" fill="url(#bgGradient)" rx="24"/>
  
  <!-- Decorative corner elements -->
  <circle cx="20" cy="20" r="8" fill="#3b82f6" opacity="0.3"/>
  <circle cx="172" cy="172" r="8" fill="#8b5cf6" opacity="0.3"/>
  
  <!-- Velo Code Logo - Speed Arrow Design -->
  <g transform="translate(96, 96)" filter="url(#glowLarge)">
    <!-- Outer circle frame with dashed style -->
    <circle cx="0" cy="0" r="72" 
          fill="none" 
          stroke="url(#veloGradientLarge)" 
          stroke-width="6" 
          opacity="0.9"/>
    
    <!-- Inner solid circle -->
    <circle cx="0" cy="0" r="60" 
          fill="none" 
          stroke="url(#veloGradientLarge)" 
          stroke-width="3" 
          opacity="0.6"/>
    
    <!-- Main speed arrow pointing right -->
    <path d="M -48,-12 L 24,-12 L 0,-36 M24,-12 L 0,12" 
          stroke="url(#veloGradientLarge)" 
          stroke-width="15" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"/>
    
    <!-- Speed lines -->
    <path d="M 36,-24 L 60,-12 L 36,0" 
          stroke="#60a5fa" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"/>
    
    <!-- Decorative dots -->
    <circle cx="-12" cy="24" r="9" fill="#8b5cf6"/>
    <circle cx="-36" cy="36" r="6" fill="#3b82f6" opacity="0.7"/>
  </g>
  
  <!-- Brand name at bottom -->
  <text x="96" y="168" text-anchor="middle" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="18" 
        font-weight="bold" 
        fill="#94a3b8">Velo Code</text>
</svg>
